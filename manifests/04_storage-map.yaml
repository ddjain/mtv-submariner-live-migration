apiVersion: forklift.konveyor.io/v1beta1
kind: StorageMap
metadata:
  name: blue-green-storage-map
  namespace: openshift-mtv
spec:
  provider:
    source:
      name: host
      namespace: openshift-mtv
    destination:
      name: green-cluster
      namespace: openshift-mtv
  map:
    - source:
        name: standard-csi
      destination:
        storageClass: standard-csi
        accessModes:
          - ReadWriteOnce
