apiVersion: forklift.konveyor.io/v1beta1
kind: NetworkMap
metadata:
  name: blue-green-network-map
  namespace: openshift-mtv
spec:
  provider:
    source:
      name: host
      namespace: openshift-mtv
    destination:
      name: green-cluster
      namespace: openshift-mtv
  map:
    - source:
        type: pod
      destination:
        type: pod
